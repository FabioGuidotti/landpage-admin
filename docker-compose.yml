version: '3.8'

services:
  db:
    image: postgres:15
    container_name: landpage_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - landpage_network

  app:
    build: ./backend
    container_name: landpage_app
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    expose:
      - "8000"
    networks:
      - landpage_network

  nginx:
    build: .
    dockerfile: nginx.Dockerfile
    container_name: landpage_nginx
    restart: always
    depends_on:
      - app
    networks:
      - landpage_network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landpage.rule=Host(`admin.ai.dashx.com.br`) || HostRegexp(`{subdomain:[a-zA-Z0-9-]+}.ai.dashx.com.br`)"
      - "traefik.http.routers.landpage.entrypoints=websecure"
      - "traefik.http.routers.landpage.tls.certresolver=letsencrypt"
      - "traefik.http.services.landpage.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

networks:
  landpage_network:
    driver: bridge
  proxy:
    external: true

volumes:
  postgres_data:
